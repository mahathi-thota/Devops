<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Event Countdown</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background-color: #f2f2f2;
      color: #333;
      text-align: center;
    }
    header {
      background-color: #004080;
      color: white;
      padding: 40px 20px;
    }
    main {
      padding: 30px 20px;
    }
    form {
      display: flex;
      flex-wrap: wrap;
      gap: 15px;
      justify-content: center;
      margin-bottom: 30px;
    }
    input[type="text"],
    input[type="date"] {
      padding: 10px;
      border-radius: 5px;
      border: 1px solid #ccc;
      font-size: 16px;
      min-width: 200px;
    }
    button {
      background-color: #004080;
      color: white;
      border: none;
      padding: 10px 18px;
      border-radius: 5px;
      font-weight: bold;
      cursor: pointer;
      min-width: 120px;
    }
    button:hover {
      background-color: #003060;
    }
    .countdown {
      display: none; /* Hidden initially */
      justify-content: center;
      flex-wrap: wrap;
      gap: 20px;
      margin-top: 30px;
    }
    .time-box {
      background-color: #fff;
      border: 2px solid #004080;
      border-radius: 10px;
      width: 120px;
      padding: 20px 10px;
      box-shadow: 0 0 8px rgba(0, 0, 0, 0.1);
    }
    .time-box span {
      font-size: 2.5rem;
      font-weight: bold;
      color: #004080;
      display: block;
    }
    .time-box label {
      font-size: 1rem;
      color: #333;
      margin-top: 8px;
    }
    #event-title {
      font-size: 1.5rem;
      margin-bottom: 15px;
    }
    #message {
      margin-top: 20px;
      font-size: 1.2rem;
      font-weight: bold;
      color: #cc0000;
    }
    #reset-btn {
      display: none; 
      margin-top: 20px;
      background-color: #cc0000;
      color: white;
      border: none;
      padding: 10px 18px;
      border-radius: 5px;
      cursor: pointer;
      min-width: 120px;
    }
    #reset-btn:hover {
      background-color: #a30000;
    }
  </style>
</head>
<body>
  <header>
    <h1>Event Countdown</h1>
    <p>Enter your event details below</p>
  </header>
  <main>
    <form id="event-form">
      <input type="text" id="event-name" placeholder="Event Name" required />
      <input type="date" id="event-date" required />
      <button type="submit">Start Countdown</button>
    </form>
    <h2 id="event-title"></h2>
    <section class="countdown">
      <div class="time-box"><span id="days">00</span><label>Days</label></div>
      <div class="time-box"><span id="hours">00</span><label>Hours</label></div>
      <div class="time-box"><span id="minutes">00</span><label>Minutes</label></div>
      <div class="time-box"><span id="seconds">00</span><label>Seconds</label></div>
    </section>
    <p id="message"></p>
    <button id="reset-btn">Reset Countdown</button>
  </main>
  <script>
    const form = document.getElementById('event-form');
    const eventTitle = document.getElementById('event-title');
    const message = document.getElementById('message');
    const daysEl = document.getElementById('days');
    const hoursEl = document.getElementById('hours');
    const minutesEl = document.getElementById('minutes');
    const secondsEl = document.getElementById('seconds');
    const resetBtn = document.getElementById('reset-btn');
    const countdownSection = document.querySelector('.countdown');
    let countdownInterval;
    function pad(num) {
      return String(num).padStart(2, '0');
    }
    function updateCountdown(targetDate, eventName) {
      const now = new Date().getTime();
      const diff = targetDate - now;
      if (diff <= 0) {
        clearInterval(countdownInterval);
        daysEl.textContent = '00';
        hoursEl.textContent = '00';
        minutesEl.textContent = '00';
        secondsEl.textContent = '00';
        message.textContent = `🎉 Time's up! It's ${eventName}!`;
        return;
      }
      const days = Math.floor(diff / (1000 * 60 * 60 * 24));
      const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
      const minutes = Math.floor((diff / (1000 * 60)) % 60);
      const seconds = Math.floor((diff / 1000) % 60);
      daysEl.textContent = pad(days);
      hoursEl.textContent = pad(hours);
      minutesEl.textContent = pad(minutes);
      secondsEl.textContent = pad(seconds);
      message.textContent = '';
    }
    function startCountdown(name, dateValue) {
      clearInterval(countdownInterval);
      message.textContent = '';
      const targetDate = new Date(dateValue + 'T00:00:00');
      if (isNaN(targetDate.getTime())) {
        message.textContent = 'Invalid date selected.';
        return;
      }
      const now = new Date();
      const today = new Date(now.getFullYear(), now.getMonth(), now.getDate()); // today at midnight
      if (targetDate < today) {
        message.textContent = 'Please choose a future date.';
        return;
      }
      eventTitle.textContent = name;
      form.style.display = 'none';
      countdownSection.style.display = 'flex';
      resetBtn.style.display = 'inline-block';
      updateCountdown(targetDate.getTime(), name);
      countdownInterval = setInterval(() => {
        updateCountdown(targetDate.getTime(), name);
      }, 1000);
    }
    form.addEventListener('submit', e => {
      e.preventDefault();
      const name = document.getElementById('event-name').value.trim();
      const dateValue = document.getElementById('event-date').value;
      if (!name || !dateValue) {
        message.textContent = 'Please fill all fields.';
        return;
      }
      startCountdown(name, dateValue);
    });
    resetBtn.addEventListener('click', () => {
      clearInterval(countdownInterval);
      form.style.display = 'flex';
      countdownSection.style.display = 'none';
      resetBtn.style.display = 'none';
      eventTitle.textContent = '';
      message.textContent = '';
      daysEl.textContent = '00';
      hoursEl.textContent = '00';
      minutesEl.textContent = '00';
      secondsEl.textContent = '00';
      form.reset();
    });
  </script>
</body>
</html>
